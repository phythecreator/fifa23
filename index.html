<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Futebol 3D - Protótipo Three.js (Single File)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 52px;
            font-weight: bold;
            text-shadow: 0 0 15px #000, 3px 3px 0 #000;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 40px;
            border-radius: 12px;
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }
        #ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        button {
            padding: 14px 32px;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(#00cc00, #009900);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px 0 #006600;
            cursor: pointer;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #006600;
        }
        #instructions {
            position: absolute;
            top: 90px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.5;
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }
        #instructions strong {
            color: #00ff00;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <div id="hud">0 - 0</div>
    <div id="instructions">
        <strong>WASD / Setas</strong> → Mover jogador<br>
        <strong>SPACE</strong> → Chutar (quando perto da bola)<br>
        <strong>Câmera</strong> segue em terceira pessoa
    </div>
    <div id="ui">
        <button onclick="resetGame()">RESETAR JOGO</button>
    </div>

    <script>
        // =============================================
        // PROTÓTIPO DE JOGO DE FUTEBOL 3D - SINGLE FILE
        // Three.js r134 + HTML/CSS/JS completo
        // Pronto para GitHub Pages
        // =============================================

        let scene, camera, renderer, clock;
        let player, ball;
        let ballVelocity;
        let keys = {};
        let playerScore = 0;
        let aiScore = 0;
        let kickCooldown = 0;
        let field, goalLeftPosts, goalRightPosts;

        const FIELD_LENGTH = 100;
        const FIELD_WIDTH = 60;
        const MOVE_SPEED = 28;
        const BALL_RADIUS = 1.1;
        const GRAVITY = 38;
        const KICK_STRENGTH = 48;

        function init() {
            // Cena básica
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x77aaff);
            scene.fog = new THREE.Fog(0x77aaff, 80, 220);

            // Câmera
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 300);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Luzes
            const ambient = new THREE.AmbientLight(0xffffff, 0.65);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffeecc, 1.1);
            sun.position.set(40, 60, 30);
            scene.add(sun);

            // Campo de futebol
            const fieldGeo = new THREE.PlaneGeometry(FIELD_LENGTH, FIELD_WIDTH);
            const fieldMat = new THREE.MeshPhongMaterial({
                color: 0x00aa11,
                shininess: 8,
                flatShading: true
            });
            field = new THREE.Mesh(fieldGeo, fieldMat);
            field.rotation.x = -Math.PI / 2;
            scene.add(field);

            // Linhas brancas do campo
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
            function createLine(points) {
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geo, lineMat);
                line.position.y = 0.06;
                scene.add(line);
                return line;
            }
            // Bordas
            createLine([
                new THREE.Vector3(-50, 0, -30),
                new THREE.Vector3(50, 0, -30),
                new THREE.Vector3(50, 0, 30),
                new THREE.Vector3(-50, 0, 30),
                new THREE.Vector3(-50, 0, -30)
            ]);
            // Linha central
            createLine([
                new THREE.Vector3(-50, 0, 0),
                new THREE.Vector3(50, 0, 0)
            ]);
            // Círculo central
            const circlePoints = [];
            for (let i = 0; i <= 48; i++) {
                const a = (i / 48) * Math.PI * 2;
                circlePoints.push(new THREE.Vector3(Math.cos(a) * 10, 0, Math.sin(a) * 10));
            }
            createLine(circlePoints);

            // Balizas (posts + travessão)
            const postMat = new THREE.MeshPhongMaterial({ color: 0xeeeeee, shininess: 30 });
            const postGeo = new THREE.BoxGeometry(0.6, 5.5, 0.6);
            const barGeo = new THREE.BoxGeometry(13, 0.6, 0.6);

            // Baliza ESQUERDA (x = -50)
            goalLeftPosts = new THREE.Group();
            const leftPost1 = new THREE.Mesh(postGeo, postMat);
            leftPost1.position.set(-50, 2.75, -6.5);
            goalLeftPosts.add(leftPost1);
            const leftPost2 = leftPost1.clone();
            leftPost2.position.z = 6.5;
            goalLeftPosts.add(leftPost2);
            const leftBar = new THREE.Mesh(barGeo, postMat);
            leftBar.position.set(-50, 5.2, 0);
            goalLeftPosts.add(leftBar);
            scene.add(goalLeftPosts);

            // Baliza DIREITA (x = +50)
            goalRightPosts = new THREE.Group();
            const rightPost1 = new THREE.Mesh(postGeo, postMat);
            rightPost1.position.set(50, 2.75, -6.5);
            goalRightPosts.add(rightPost1);
            const rightPost2 = rightPost1.clone();
            rightPost2.position.z = 6.5;
            goalRightPosts.add(rightPost2);
            const rightBar = new THREE.Mesh(barGeo, postMat);
            rightBar.position.set(50, 5.2, 0);
            goalRightPosts.add(rightBar);
            scene.add(goalRightPosts);

            // Jogador (humanoide simples com cubos e esferas)
            player = new THREE.Group();
            scene.add(player);
            player.position.set(-22, 0, 0);

            // Corpo
            const torsoGeo = new THREE.BoxGeometry(2.2, 2.8, 1.6);
            const torsoMat = new THREE.MeshPhongMaterial({ color: 0x0033ff });
            const torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 2.8;
            player.add(torso);

            // Cabeça
            const headGeo = new THREE.SphereGeometry(1.1, 24, 24);
            const headMat = new THREE.MeshPhongMaterial({ color: 0xffddaa });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.set(0, 5.1, 0);
            player.add(head);

            // Pernas
            const legGeo = new THREE.BoxGeometry(0.7, 2.8, 0.9);
            const legMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const leftLeg = new THREE.Mesh(legGeo, legMat);
            leftLeg.position.set(-0.75, 1.2, 0);
            player.add(leftLeg);
            const rightLeg = leftLeg.clone();
            rightLeg.position.x = 0.75;
            player.add(rightLeg);

            // Braços
            const armGeo = new THREE.BoxGeometry(0.6, 2.4, 0.7);
            const armMat = new THREE.MeshPhongMaterial({ color: 0xffddaa });
            const leftArm = new THREE.Mesh(armGeo, armMat);
            leftArm.position.set(-1.5, 3.6, 0);
            leftArm.rotation.z = 0.6;
            player.add(leftArm);
            const rightArm = leftArm.clone();
            rightArm.position.x = 1.5;
            rightArm.rotation.z = -0.6;
            player.add(rightArm);

            // Bola
            const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
            const ballMat = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                shininess: 40,
                specular: 0x222222
            });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.set(0, BALL_RADIUS, 0);
            scene.add(ball);
            ballVelocity = new THREE.Vector3(0, 0, 0);

            // Controles de teclado
            window.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].indexOf(e.key) > -1) e.preventDefault();
            });
            window.addEventListener('keyup', e => {
                keys[e.key] = false;
            });

            // Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Inicia HUD
            document.getElementById('hud').textContent = `${playerScore} - ${aiScore}`;

            // Loop principal
            animate();
        }

        function updatePlayer(delta) {
            let moveX = 0;
            let moveZ = 0;

            if (keys['ArrowLeft'] || keys['a'] || keys['A']) moveX -= 1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) moveX += 1;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) moveZ -= 1;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) moveZ += 1;

            if (moveX !== 0 || moveZ !== 0) {
                const dir = new THREE.Vector3(moveX, 0, moveZ).normalize();
                const speed = MOVE_SPEED * delta;

                player.position.x += dir.x * speed;
                player.position.z += dir.z * speed;

                // Faz o jogador olhar para a direção do movimento
                const lookTarget = player.position.clone().add(dir);
                player.lookAt(lookTarget);

                // Mantém dentro do campo
                player.position.x = Math.max(-47, Math.min(47, player.position.x));
                player.position.z = Math.max(-28, Math.min(28, player.position.z));
            }
        }

        function handlePlayerBallCollision() {
            const playerPos = player.position;
            const distVec = new THREE.Vector3().subVectors(ball.position, playerPos);
            const distance = distVec.length();

            if (distance < 3.8 && distance > 0.1) {
                const pushDir = distVec.normalize();
                const overlap = 3.8 - distance;
                ball.position.addScaledVector(pushDir, overlap + 0.2);
            }
        }

        function updateBall(delta) {
            // Gravidade
            ballVelocity.y -= GRAVITY * delta;

            // Movimento
            ball.position.addScaledVector(ballVelocity, delta);

            // Colisão com o chão
            if (ball.position.y <= BALL_RADIUS) {
                ball.position.y = BALL_RADIUS;
                if (ballVelocity.y < 0) ballVelocity.y = -ballVelocity.y * 0.58;
                // Atrito no chão
                ballVelocity.x *= 0.94;
                ballVelocity.z *= 0.94;
                if (Math.abs(ballVelocity.x) < 1) ballVelocity.x = 0;
                if (Math.abs(ballVelocity.z) < 1) ballVelocity.z = 0;
            }

            // Atrito no ar
            ballVelocity.multiplyScalar(0.985);

            // Limites laterais do campo
            if (Math.abs(ball.position.x) > 49) {
                ball.position.x = Math.sign(ball.position.x) * 49;
                ballVelocity.x *= -0.7;
            }
            if (Math.abs(ball.position.z) > 29) {
                ball.position.z = Math.sign(ball.position.z) * 29;
                ballVelocity.z *= -0.7;
            }
        }

        function checkGoals() {
            const goalHalfWidth = 6.5;

            // Baliza esquerda (IA marca)
            if (ball.position.x < -48.5 && Math.abs(ball.position.z) < goalHalfWidth && ball.position.y < 5.5) {
                aiScore++;
                document.getElementById('hud').textContent = `${playerScore} - ${aiScore}`;
                resetBall();
            }

            // Baliza direita (Jogador marca)
            if (ball.position.x > 48.5 && Math.abs(ball.position.z) < goalHalfWidth && ball.position.y < 5.5) {
                playerScore++;
                document.getElementById('hud').textContent = `${playerScore} - ${aiScore}`;
                resetBall();
            }
        }

        function kickBall() {
            const distance = player.position.distanceTo(ball.position);
            if (distance > 6) return;

            const facingDir = new THREE.Vector3();
            player.getWorldDirection(facingDir);
            facingDir.y = 0;
            facingDir.normalize();

            // Impulso forte na direção que o jogador está olhando + leve elevação
            ballVelocity.copy(facingDir).multiplyScalar(KICK_STRENGTH);
            ballVelocity.y = 14 + Math.random() * 6;
        }

        function resetBall() {
            ball.position.set(4, BALL_RADIUS + 3, 0);
            ballVelocity.set(0, 8, 0);
            player.position.set(-22, 0, 0);
            player.rotation.set(0, 0, 0);
            kickCooldown = 0;
        }

        // Função global chamada pelo botão Reset
        window.resetGame = function () {
            playerScore = 0;
            aiScore = 0;
            document.getElementById('hud').textContent = '0 - 0';
            resetBall();
        };

        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1);

            updatePlayer(delta);
            handlePlayerBallCollision();
            updateBall(delta);

            // Cooldown do chute
            if (kickCooldown > 0) kickCooldown -= delta;

            // Chute com SPACE
            if (keys[' '] && kickCooldown <= 0) {
                kickBall();
                kickCooldown = 0.65;
            }

            checkGoals();

            // Câmera terceira pessoa suave (atrás do jogador)
            const offset = new THREE.Vector3(0, 19, 38);
            offset.applyQuaternion(player.quaternion);
            const idealPos = player.position.clone().add(offset);
            camera.position.lerp(idealPos, 0.12);

            const lookAtPos = player.position.clone();
            lookAtPos.y += 3.5;
            camera.lookAt(lookAtPos);

            renderer.render(scene, camera);
        }

        // Inicia tudo
        window.onload = init;
    </script>
</body>
</html>
