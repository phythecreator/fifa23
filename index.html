<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Futebol 3D - IA e Posse de Bola</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; z-index: 10; pointer-events: none; }
        #score { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        #instructions { font-size: 14px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
        .key { font-weight: bold; color: #ffcc00; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Azuis (Tu): 0 | Vermelhos: 0</div>
        <div id="instructions">
            Mover: <span class="key">WASD</span> ou <span class="key">Setas</span><br>
            Toca na bola para a prender aos pés.<br>
            Chutar/Passar: <span class="key">Clique Esquerdo</span> ou <span class="key">Espaço</span>
        </div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SETUP DA CENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(20, 50, 20);
        light.castShadow = true;
        light.shadow.camera.left = -40; light.shadow.camera.right = 40;
        light.shadow.camera.top = 40; light.shadow.camera.bottom = -40;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // --- 2. CAMPO E BALIZAS ---
        const fieldW = 50, fieldL = 80;
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(fieldW, fieldL), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Linhas
        const lineMat = new THREE.MeshBasicMaterial({color: 0xffffff});
        const addLine = (w, h, x, z) => {
            const l = new THREE.Mesh(new THREE.PlaneGeometry(w, h), lineMat);
            l.rotation.x = -Math.PI / 2; l.position.set(x, 0.05, z);
            scene.add(l);
        };
        addLine(fieldW, 0.4, 0, 0); addLine(fieldW, 0.4, 0, fieldL/2); addLine(fieldW, 0.4, 0, -fieldL/2);
        addLine(0.4, fieldL, fieldW/2, 0); addLine(0.4, fieldL, -fieldW/2, 0);

        // Balizas
        const goalW = 10, goalH = 3, goalD = 2;
        const createGoal = (z, color) => {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color});
            const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, goalH), mat); p1.position.set(-goalW/2, goalH/2, 0);
            const p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, goalH), mat); p2.position.set(goalW/2, goalH/2, 0);
            const cross = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, goalW), mat); cross.rotation.z = Math.PI/2; cross.position.set(0, goalH, 0);
            g.add(p1, p2, cross); g.position.z = z; scene.add(g);
        };
        createGoal(fieldL/2, 0xaaaaaa); // Baliza Sul (Azuis defendem)
        createGoal(-fieldL/2, 0xaaaaaa); // Baliza Norte (Vermelhos defendem)

        // --- 3. CLASSES DE JOGO ---
        class Ball {
            constructor() {
                this.mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({color: 0xffffff}));
                this.mesh.castShadow = true;
                this.mesh.position.y = 0.5;
                scene.add(this.mesh);
                this.velocity = new THREE.Vector3();
                this.owner = null;
                this.cooldown = 0; // Evita agarrar a bola no frame exato após chutar
            }

            update(delta) {
                if (this.cooldown > 0) this.cooldown -= delta;

                if (this.owner) {
                    // Bola segue colada ao pé do dono
                    const offset = new THREE.Vector3(0, -0.4, -0.8).applyQuaternion(this.owner.mesh.quaternion);
                    this.mesh.position.copy(this.owner.mesh.position).add(offset);
                    this.mesh.position.y = 0.5;
                    this.velocity.set(0,0,0);
                } else {
                    // Física solta
                    this.velocity.y -= 9.8 * delta; // Gravidade
                    this.mesh.position.addScaledVector(this.velocity, delta);

                    if (this.mesh.position.y <= 0.5) {
                        this.mesh.position.y = 0.5;
                        this.velocity.y *= -0.6; // Quique
                        this.velocity.x *= 0.95; // Atrito chão
                        this.velocity.z *= 0.95;
                    }

                    // Limites de campo laterais
                    if (Math.abs(this.mesh.position.x) > fieldW/2) {
                        this.mesh.position.x = Math.sign(this.mesh.position.x) * fieldW/2;
                        this.velocity.x *= -0.8;
                    }
                }
            }

            shoot(power, direction) {
                this.owner = null;
                this.cooldown = 0.5; // Meio segundo sem ninguém poder agarrar para a bola poder voar
                this.velocity.copy(direction).multiplyScalar(power);
                this.velocity.y = power * 0.2; // Levanta um pouco a bola
            }
        }

        class Player {
            constructor(color, isAI, role, startPos) {
                this.isAI = isAI;
                this.role = role; // 'player' ou 'gk'
                this.startPos = startPos.clone();
                this.speed = role === 'gk' ? 8 : 12;
                this.teamColor = color;

                // Construção do Humanoide
                this.mesh = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({color: color});
                const skinMat = new THREE.MeshStandardMaterial({color: 0xffccaa});
                
                const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.6), bodyMat);
                torso.position.y = 1.25; torso.castShadow = true;
                
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), skinMat);
                head.position.y = 2.4; head.castShadow = true;

                // Indicador de "frente" (nariz) para saber para onde olham
                const nose = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0xff0000}));
                nose.position.set(0, 2.4, -0.45);

                this.mesh.add(torso, head, nose);
                this.mesh.position.copy(startPos);
                scene.add(this.mesh);
            }

            update(delta, ball, allPlayers) {
                // Tentar agarrar a bola se estiver livre
                if (!ball.owner && ball.cooldown <= 0) {
                    const dist = this.mesh.position.distanceTo(ball.mesh.position);
                    if (dist < 1.5) {
                        ball.owner = this;
                    }
                }

                if (this.isAI) {
                    this.runAI(delta, ball, allPlayers);
                }
            }

            runAI(delta, ball, allPlayers) {
                let target = new THREE.Vector3();
                let isShooting = false;

                if (this.role === 'gk') {
                    // IA do Guarda-Redes: Segue a bola no eixo X, fica na linha de fundo
                    target.set(ball.mesh.position.x, 0, this.startPos.z);
                    target.x = THREE.MathUtils.clamp(target.x, -goalW/2 + 1, goalW/2 - 1);
                } else {
                    // IA de Jogadores de Campo
                    if (ball.owner === this) {
                        // Tem a bola: Corre para a baliza adversária e chuta
                        const enemyGoalZ = this.teamColor === 0xff0000 ? fieldL/2 : -fieldL/2;
                        target.set(0, 0, enemyGoalZ);
                        
                        // Se estiver perto o suficiente da baliza, chuta
                        if (Math.abs(this.mesh.position.z - enemyGoalZ) < 20) {
                            isShooting = true;
                        }
                    } else if (!ball.owner || ball.owner.teamColor !== this.teamColor) {
                        // Bola solta ou com adversário: Persegue a bola
                        target.copy(ball.mesh.position);
                    } else {
                        // Colega tem a bola: Corre para a frente para receber passe
                        const enemyGoalZ = this.teamColor === 0xff0000 ? fieldL/2 : -fieldL/2;
                        target.set(this.startPos.x, 0, THREE.MathUtils.lerp(this.mesh.position.z, enemyGoalZ, 0.5));
                    }
                }

                // Movimento e Rotação da IA
                const dir = new THREE.Vector3().subVectors(target, this.mesh.position);
                dir.y = 0;
                if (dir.length() > 0.5) {
                    const moveDist = Math.min(this.speed * delta, dir.length());
                    dir.normalize();
                    this.mesh.position.addScaledVector(dir, moveDist);
                    
                    // Suavizar rotação
                    const targetRot = Math.atan2(dir.x, dir.z);
                    this.mesh.rotation.y = targetRot;
                }

                // Executar chute da IA
                if (isShooting && ball.owner === this) {
                    const shootDir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.mesh.quaternion);
                    ball.shoot(25, shootDir);
                }
            }
        }

        // --- 4. INSTANCIAÇÃO ---
        const ball = new Ball();
        const players = [];
        
        // Equipa Azul (Jogador + 2 Colegas + GK)
        const user = new Player(0x0000ff, false, 'player', new THREE.Vector3(0, 0, 10)); // O nosso jogador
        players.push(user);
        players.push(new Player(0x0000ff, true, 'player', new THREE.Vector3(-10, 0, 5)));
        players.push(new Player(0x0000ff, true, 'player', new THREE.Vector3(10, 0, 5)));
        players.push(new Player(0xaaaa00, true, 'gk', new THREE.Vector3(0, 0, fieldL/2 - 2))); // GK Azul

        // Equipa Vermelha (Adversários: 3 + GK)
        players.push(new Player(0xff0000, true, 'player', new THREE.Vector3(0, 0, -10)));
        players.push(new Player(0xff0000, true, 'player', new THREE.Vector3(-10, 0, -5)));
        players.push(new Player(0xff0000, true, 'player', new THREE.Vector3(10, 0, -5)));
        players.push(new Player(0xaaaa00, true, 'gk', new THREE.Vector3(0, 0, -fieldL/2 + 2))); // GK Vermelho

        let scoreBlue = 0, scoreRed = 0;

        // --- 5. CONTROLOS DO JOGADOR ---
        const keys = {};
        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space') e.preventDefault(); });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Chutar/Passar com o Rato ou Espaço
        const handleShoot = () => {
            if (ball.owner === user) {
                const shootDir = new THREE.Vector3(0, 0, -1).applyQuaternion(user.mesh.quaternion);
                ball.shoot(30, shootDir); // Força do chute do jogador
            }
        };
        window.addEventListener('mousedown', handleShoot);

        // --- 6. LOOP PRINCIPAL ---
        const clock = new THREE.Clock();

        function resetPositions() {
            players.forEach(p => p.mesh.position.copy(p.startPos));
            ball.mesh.position.set(0, 5, 0); // Larga do ar no meio
            ball.velocity.set(0,0,0);
            ball.owner = null;
            ball.cooldown = 1.0;
        }

        function checkGoals() {
            if (Math.abs(ball.mesh.position.z) > fieldL/2) {
                if (Math.abs(ball.mesh.position.x) < goalW/2 && ball.mesh.position.y < goalH) {
                    if (ball.mesh.position.z < 0) scoreBlue++;
                    else scoreRed++;
                    document.getElementById('score').innerText = `Azuis (Tu): ${scoreBlue} | Vermelhos: ${scoreRed}`;
                    resetPositions();
                } else {
                    // Bateu na parede do fundo fora da baliza
                    ball.mesh.position.z = Math.sign(ball.mesh.position.z) * fieldL/2;
                    ball.velocity.z *= -0.5;
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            // Controlos do Jogador Humano
            let moveDir = new THREE.Vector3();
            if (keys['KeyW'] || keys['ArrowUp']) moveDir.z -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) moveDir.z += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) moveDir.x -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) moveDir.x += 1;

            if (moveDir.lengthSq() > 0) {
                moveDir.normalize();
                user.mesh.position.addScaledVector(moveDir, user.speed * delta);
                // Rotação instantânea para a direção do movimento
                user.mesh.rotation.y = Math.atan2(moveDir.x, moveDir.z);
            }

            // Chutar com a barra de espaço
            if (keys['Space']) {
                handleShoot();
                keys['Space'] = false; // "Debounce" rudimentar
            }

            // Limites do jogador no campo
            user.mesh.position.x = THREE.MathUtils.clamp(user.mesh.position.x, -fieldW/2, fieldW/2);
            user.mesh.position.z = THREE.MathUtils.clamp(user.mesh.position.z, -fieldL/2, fieldL/2);

            // Atualizar Entidades
            players.forEach(p => p.update(delta, ball, players));
            ball.update(delta);
            checkGoals();

            // Câmara Dinâmica: Segue o jogador
            const camOffset = new THREE.Vector3(0, 15, 20);
            camera.position.lerp(user.mesh.position.clone().add(camOffset), 0.1);
            camera.lookAt(user.mesh.position);

            renderer.render(scene, camera);
        }

        // --- Iniciar ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        resetPositions();
        animate();
    </script>
</body>
</html>
