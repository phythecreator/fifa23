<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mini FIFA 3D Melhorado</title>
<style>
  body { margin: 0; overflow: hidden; font-family: Arial; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
  }
  button { margin-top: 5px; padding: 5px 10px; cursor: pointer; }
</style>
</head>
<body>

<div id="hud">
  <div>Placar: <span id="score">0 - 0</span></div>
  <button onclick="resetGame()">Reset</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, ball;
let teammates = [], enemies = [];
let ballVelocity = new THREE.Vector3();
let keys = {};
let scoreA = 0, scoreB = 0;

init();
animate();

function createHumanoid(color){
  const group = new THREE.Group();

  const material = new THREE.MeshStandardMaterial({color});

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.5,0.5), material);
  body.position.y = 1.5;

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.4,16,16), material);
  head.position.y = 2.5;

  const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3), material);
  leg1.position.set(-0.2,0.5,0);

  const leg2 = leg1.clone();
  leg2.position.x = 0.2;

  group.add(body, head, leg1, leg2);
  return group;
}

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(20,30,10);
  scene.add(light);

  // Campo melhorado
  const field = new THREE.Mesh(
    new THREE.PlaneGeometry(60,40),
    new THREE.MeshStandardMaterial({color:0x2e8b57})
  );
  field.rotation.x = -Math.PI/2;
  scene.add(field);

  // Linhas
  const lineMat = new THREE.LineBasicMaterial({color:0xffffff});
  const circle = new THREE.Mesh(
    new THREE.RingGeometry(3,3.2,32),
    new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.DoubleSide})
  );
  circle.rotation.x = -Math.PI/2;
  scene.add(circle);

  // Jogador
  player = createHumanoid(0x0000ff);
  scene.add(player);

  // Teammates
  for(let i=0;i<2;i++){
    let mate = createHumanoid(0x00ff00);
    mate.position.set(-5 + i*3,0,5);
    teammates.push(mate);
    scene.add(mate);
  }

  // Inimigos
  for(let i=0;i<3;i++){
    let enemy = createHumanoid(0xff0000);
    enemy.position.set(5 + i*3,0,-5);
    enemies.push(enemy);
    scene.add(enemy);
  }

  // Bola
  ball = new THREE.Mesh(
    new THREE.SphereGeometry(0.5,32,32),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  ball.position.set(0,0.5,0);
  scene.add(ball);

  // Balizas melhores
  createGoal(-29);
  createGoal(29);

  window.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
  window.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);
}

function createGoal(x){
  const mat = new THREE.MeshStandardMaterial({color:0xffffff});

  const post1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,3), mat);
  const post2 = post1.clone();
  const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,4), mat);

  post1.position.set(x,1.5,-2);
  post2.position.set(x,1.5,2);

  bar.rotation.z = Math.PI/2;
  bar.position.set(x,3,0);

  scene.add(post1,post2,bar);
}

function animate(){
  requestAnimationFrame(animate);
  movePlayer();
  moveAI();
  updateBall();
  checkGoal();
  updateCamera();
  renderer.render(scene,camera);
}

function movePlayer(){
  let speed = 0.15;

  if(keys["w"]) player.position.z -= speed;
  if(keys["s"]) player.position.z += speed;
  if(keys["a"]) player.position.x -= speed;
  if(keys["d"]) player.position.x += speed;

  let dist = player.position.distanceTo(ball.position);

  // toque mais suave
  if(dist < 1.5){
    let dir = new THREE.Vector3().subVectors(ball.position, player.position).normalize();
    ballVelocity.add(dir.multiplyScalar(0.03)); // MUITO mais suave
  }
}

function moveAI(){
  enemies.forEach(e=>{
    let dir = new THREE.Vector3().subVectors(ball.position, e.position).normalize();
    e.position.add(dir.multiplyScalar(0.05));

    if(e.position.distanceTo(ball.position)<1.5){
      ballVelocity.add(dir.multiplyScalar(0.02));
    }
  });

  teammates.forEach(t=>{
    let dir = new THREE.Vector3().subVectors(ball.position, t.position).normalize();
    t.position.add(dir.multiplyScalar(0.04));
  });
}

function updateBall(){
  ballVelocity.y -= 0.01;
  ball.position.add(ballVelocity);

  if(ball.position.y < 0.5){
    ball.position.y = 0.5;
    ballVelocity.y *= -0.4;
  }

  ballVelocity.multiplyScalar(0.97); // mais atrito
}

function checkGoal(){
  if(ball.position.x < -30 && Math.abs(ball.position.z)<3){
    scoreB++; updateScore(); resetBall();
  }
  if(ball.position.x > 30 && Math.abs(ball.position.z)<3){
    scoreA++; updateScore(); resetBall();
  }
}

function updateScore(){
  document.getElementById("score").innerText = scoreA+" - "+scoreB;
}

function resetBall(){
  ball.position.set(0,0.5,0);
  ballVelocity.set(0,0,0);
}

function resetGame(){
  scoreA=0; scoreB=0;
  updateScore();
  resetBall();
  player.position.set(0,0,0);
}

function updateCamera(){
  camera.position.set(
    player.position.x,
    player.position.y + 8,
    player.position.z + 10
  );
  camera.lookAt(player.position);
}
</script>

</body>
</html>
